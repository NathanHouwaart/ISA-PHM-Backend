name: backend-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint
        run: python -m ruff check app tests tools

      - name: Run tests
        run: pytest -q

      - name: Smoke conversion and ISA validation
        run: |
          TMP_OUT=$(mktemp /tmp/isa-phm-out-XXXXXX.json)
          python app/web-to-isa-phm.py tests/fixtures/minimal_payload.json "$TMP_OUT"
          python tools/verify-isa-json.py "$TMP_OUT"
